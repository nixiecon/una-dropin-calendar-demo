<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNA Drop-In Schedule — Live Data Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="calendar-app">

    <!-- Header band -->
    <header class="cal-header">
      <h1 class="cal-title">
        Drop In Schedule
        <span class="cal-title-sep">|</span>
        <span id="date-range">—</span>
      </h1>
      <div class="view-toggle" role="tablist" aria-label="View mode">
        <button type="button" class="view-toggle-btn" data-view="grid" aria-pressed="true">Grid view</button>
        <button type="button" class="view-toggle-btn" data-view="list" aria-pressed="false">List view</button>
      </div>
    </header>

    <!-- Filters -->
    <button type="button" id="mobile-filters-toggle" class="mobile-filters-toggle" aria-expanded="false" aria-controls="filters">
      <span>Filters</span>
      <span class="mobile-filters-chevron" aria-hidden="true">&#9662;</span>
    </button>

    <div id="filters" class="filters">
      <div class="filter">
        <span class="filter-label">Program Type</span>
        <div class="multi-select" id="filter-program-type"
             data-filter-key="programType"
             data-placeholder="All Drop-Ins"
             data-options='["Sport Drop-In","Social Program Drop-In","Registered Sports","Programs with Drop-In Options","Family Sports Drop In"]'></div>
      </div>

      <div class="filter">
        <span class="filter-label">Age Category</span>
        <div class="multi-select" id="filter-age-category"
             data-filter-key="ageCategory"
             data-placeholder="All Categories"
             data-options='["Early Years","Children","Youth","Adults","Older Adults","Everyone (all-ages)"]'></div>
      </div>

      <label class="filter">
        <span class="filter-label">Availability</span>
        <select id="filter-availability">
          <option value="">All Availability</option>
          <option value="available">Still Available</option>
        </select>
      </label>

      <label class="filter">
        <span class="filter-label">Location</span>
        <select id="filter-location">
          <option value="">All Locations</option>
          <!-- Locations populated dynamically by calendar.js -->
        </select>
      </label>
    </div>

    <!-- Week navigation -->
    <nav class="week-nav" aria-label="Week navigation">
      <button type="button" id="prev-week" class="nav-btn nav-btn-prev">
        <span class="nav-btn-icon" aria-hidden="true">&#8249;</span>
        <span class="nav-btn-label">Previous Week</span>
      </button>
      <button type="button" id="today-btn" class="nav-btn nav-btn-today">Today</button>
      <button type="button" id="next-week" class="nav-btn nav-btn-next">
        <span class="nav-btn-label">Next Week</span>
        <span class="nav-btn-icon" aria-hidden="true">&#8250;</span>
      </button>
    </nav>

    <!-- Mobile day-tab strip -->
    <div id="mobile-day-tabs" class="mobile-day-tabs" role="tablist" aria-label="Day selector">
    </div>

    <!-- Calendar grid -->
    <main id="calendar-grid" class="calendar-grid" aria-live="polite">
    </main>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <p>No programs match your filters.</p>
    </div>

    <!-- Mobile bottom-sheet -->
    <div id="mobile-sheet" class="mobile-sheet" hidden role="dialog" aria-modal="true" aria-labelledby="mobile-sheet-title">
      <div class="mobile-sheet-backdrop" data-close-sheet></div>
      <div class="mobile-sheet-panel">
        <button type="button" class="mobile-sheet-close" data-close-sheet aria-label="Close">&times;</button>
        <div id="mobile-sheet-content"></div>
      </div>
    </div>

  </div>
